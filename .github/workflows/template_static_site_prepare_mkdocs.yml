name: Template Static Site Prepare (MkDocs)

on:
  workflow_call:
    inputs:
      runs_on:
        description: "Runner image (e.g. ubuntu-latest)"
        type: string
        required: false
        default: ubuntu-latest
      uv_sync_flags:
        description: "Optional flags for the `uv sync` command (e.g. `--group docs` or `--extra docs`)."
        type: string
        required: false
      mkdocs_config:
        description: "Path to mkdocs config file"
        type: string
        required: false
        default: mkdocs.yml
      static_site_branch:
        description: "Branch to publish built site to"
        type: string
        required: false
        default: static-site
      site_dir:
        description: "Output directory for mkdocs build"
        type: string
        required: false
        default: site

permissions:
  contents: write

jobs:
  deploy:
    name: Setup, Build, and Deploy
    runs-on: ${{ inputs.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # --- Tool setup ---
      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      # --- Sync dependencies ---
      - name: Sync dependencies uv
        run: uv sync ${{ inputs.uv_sync_flags || '' }}

      # --- Build Site ---
      - name: Build site uv
        run: uv run mkdocs build --config-file "${{ inputs.mkdocs_config }}"

      # --- Deploy Site ---
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: ${{ inputs.static_site_branch }}
          folder: ${{ inputs.site_dir }}
          clean: true
